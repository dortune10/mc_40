name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          script: |
            # Ensure the deployment directory exists
            mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            
            # If the directory is not a git repository, clone it
            if [ ! -d ".git" ]; then
              echo "Repository not found. Cloning..."
              git clone https://github.com/dortune10/mc_40.git .
            else
              # Force pull latest changes
              git fetch origin
              git reset --hard origin/main
            fi
            
            # Install dependencies and build
            npm install
            npm run build
            
            # Restart or start the application using PM2
            pm2 restart mc_40 || pm2 start npm --name "mc_40" -- run start
