name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            echo "Deploying to: $DEPLOY_PATH"
            
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            
            if [ ! -d ".git" ]; then
              echo "Initializing Git repository in existing directory..."
              git init
              git remote add origin https://github.com/dortune10/mc_40.git || true
            fi
            
            echo "Fetching latest changes from GitHub..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "Installing dependencies..."
            npm install
            
            echo "Building application..."
            npm run build
            
            echo "Starting PM2 process..."
            pm2 delete mc_40 || true
            pm2 start npm --name "mc_40" --cwd "$DEPLOY_PATH" -- run start
            
            echo "✅ Deployment successful!"
